version: 0.0
os: linux
files:
  - source: /
    destination: /var/s3-nodejs-app
file_exists_behavior: OVERWRITE

hooks:
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/restart_app.sh
      timeout: 300
      runas: root

